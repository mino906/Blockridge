<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuildRight — Construction Learning Game</title>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 1. Game canvas — z-index: 1 -->
  <canvas id="renderCanvas"></canvas>

  <!-- 2. HUD overlay — z-index: 20, pointer-events: none so clicks reach canvas -->
  <div id="hud">
    <div id="crosshair">+</div>
    <div id="block-indicator">
      <span id="block-icon">🟫</span>
      <span id="block-name">Dirt</span>
    </div>
    <div id="controls-hint">
      <strong>Controls</strong><br/>
      WASD — Move &nbsp;|&nbsp; Mouse — Look<br/>
      Space — Jump &nbsp;|&nbsp; Shift — Sprint<br/>
      Left Click — Remove &nbsp;|&nbsp; Right Click — Place<br/>
      1 / 2 — Switch Block &nbsp;|&nbsp; ESC — Pause
    </div>
  </div>

  <!-- 3. Paused overlay — z-index: 150 (shown when pointer lock releases mid-game) -->
  <div id="paused-overlay">⏸ PAUSED — Click to Resume</div>

  <!-- 4. Start prompt — z-index: 200 (topmost, OUTSIDE #hud so pointer-events work) -->
  <div id="lock-prompt">
    <div id="lock-box">
      <h1>🏗️ BuildRight</h1>
      <p>A 3D Construction Learning Game</p>
      <button id="start-btn">Click to Start</button>
    </div>
  </div>

  <!-- Scripts — load in dependency order -->
  <script src="js/blocks.js"></script>
  <script src="js/world.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
