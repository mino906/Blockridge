<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuildRight — Construction Learning Game</title>

  <!-- CDN libraries load first, synchronously, before any game code -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    #renderCanvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      z-index: 1;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
      user-select: none;
    }

    #block-indicator {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 20px;
      font-size: 15px;
      font-weight: 600;
      backdrop-filter: blur(6px);
    }

    #block-icon { font-size: 20px; }

    #controls-hint {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.8;
      backdrop-filter: blur(6px);
      transition: opacity 0.6s ease;
    }

    #controls-hint.hidden { opacity: 0; }

    #paused-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      z-index: 150;
      font-size: 2rem;
      font-weight: 700;
      cursor: pointer;
    }
    #paused-overlay.visible { display: flex; }

    #lock-prompt {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      z-index: 200;
      transition: opacity 0.4s ease;
    }
    #lock-prompt.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    #lock-box {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #lock-box h1 { font-size: 3rem; font-weight: 800; }
    #lock-box p  { font-size: 1.1rem; color: rgba(255,255,255,0.6); letter-spacing: 0.05em; }

    #start-btn {
      margin-top: 12px;
      padding: 14px 40px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #e8a020;
      color: #1a0f00;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    #start-btn:hover  { background: #f5b534; transform: translateY(-2px); }
    #start-btn:active { transform: translateY(0); }
  </style>
</head>
<body>

  <canvas id="renderCanvas"></canvas>

  <div id="hud">
    <div id="crosshair">+</div>
    <div id="block-indicator">
      <span id="block-icon">🟫</span>
      <span id="block-name">Dirt</span>
    </div>
    <div id="controls-hint">
      <strong>Controls</strong><br/>
      WASD — Move &nbsp;|&nbsp; Mouse — Look<br/>
      Space — Jump &nbsp;|&nbsp; Shift — Sprint<br/>
      Left Click — Remove &nbsp;|&nbsp; Right Click — Place<br/>
      1 / 2 — Switch Block &nbsp;|&nbsp; ESC — Pause
    </div>
  </div>

  <div id="paused-overlay">⏸ PAUSED — Click to Resume</div>

  <div id="lock-prompt">
    <div id="lock-box">
      <h1>🏗️ BuildRight</h1>
      <p>A 3D Construction Learning Game</p>
      <button id="start-btn">Click to Start</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       ALL GAME SCRIPTS INLINE — zero load-order issues
       Scripts run top-to-bottom synchronously after CDNs load
       ═══════════════════════════════════════════════════════ -->

  <!-- blocks.js -->
  <script>
    // ─── Block Definitions ───────────────────────────────────────
    // textures: single URL string  → all faces get that texture
    //           object { top, side, bottom } → per-face textures (grass style)
    // fallbackColor: shown instantly while texture downloads
    const BLOCK_TYPES = {
      dirt: {
        id: "dirt", name: "Dirt", emoji: "🟫",
        fallbackColor: "#7a5230",
        texture: "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/dirt.png",
      },
      grass: {
        id: "grass", name: "Grass", emoji: "🟩",
        fallbackColor: "#035708",
        // Grass uses per-face textures — top is green, sides show dirt+grass edge
        texture: {
          top:    "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/grass_top.png",
          side:   "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/grass_side.png",
          bottom: "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/dirt.png",
        },
      },
      stone: {
        id: "stone", name: "Stone", emoji: "⬜",
        fallbackColor: "#6c6c70",
        texture: "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/stone.png",
      },
      concrete: {
        id: "concrete", name: "Concrete", emoji: "🔲",
        fallbackColor: "#b0a898",
        // Use cobblestone texture — closest to rough concrete look available free
        texture: "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/cobblestone.png",
      },
      wood: {
        id: "wood", name: "Wood Plank", emoji: "🪵",
        fallbackColor: "#c8852a",
        texture: "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/planks_oak.png",
      },
      sand: {
        id: "sand", name: "Sand", emoji: "🟡",
        fallbackColor: "#e8d59a",
        texture: "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/sand.png",
      },
      iron: {
        id: "iron", name: "Iron / Rebar", emoji: "🩶",
        fallbackColor: "#a0a0b0",
        texture: "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/minecraft/iron_block.png",
      },
    };

    // Phase 1 hotbar: dirt + stone. More unlock in Phase 2.
    const PHASE_1_HOTBAR = ["dirt", "stone"];

    // Cache: blockId → material (or MultiMaterial for grass)
    const blockMaterials = {};

    // ─── Texture helper ──────────────────────────────────────────
    /**
     * Creates a StandardMaterial with a texture URL.
     * While the texture downloads, the fallback color shows immediately
     * so the world never looks completely broken.
     *
     * uScale / vScale = 1 means the texture tiles exactly once per face.
     * Minecraft textures are pixel-art (16x16) so we keep filtering
     * NEAREST to get crisp pixels instead of blurry interpolation.
     */
    function _makeMat(name, url, scene, fallbackHex) {
      const mat = new BABYLON.StandardMaterial(name, scene);

      // Show the fallback color right away
      mat.diffuseColor = BABYLON.Color3.FromHexString(fallbackHex);
      mat.ambientColor = new BABYLON.Color3(0.25, 0.25, 0.25);

      // Load texture asynchronously
      const tex = new BABYLON.Texture(url, scene,
        /* noMipmap  */ false,
        /* invertY   */ false,
        /* samplingMode */ BABYLON.Texture.NEAREST_SAMPLINGMODE
      );

      tex.onLoadObservable.addOnce(() => {
        mat.diffuseTexture = tex;
        mat.diffuseColor   = new BABYLON.Color3(1, 1, 1); // remove tint once texture loads
      });

      return mat;
    }

    /**
     * Builds the material(s) for every block type and caches them.
     *
     * For grass we create a MultiMaterial with 3 sub-materials:
     *   subMaterial index 0 → sides  (Babylon face order: right, left, top, bottom, front, back)
     *   subMaterial index 1 → top
     *   subMaterial index 2 → bottom
     *
     * Babylon.js CreateBox face indices:
     *   0 = +X (right),  1 = -X (left)
     *   2 = +Y (top),    3 = -Y (bottom)
     *   4 = +Z (front),  5 = -Z (back)
     */
    function initBlockMaterials(scene) {
      Object.values(BLOCK_TYPES).forEach((b) => {
        if (typeof b.texture === "string") {
          // ── Simple block: same texture on all faces ──
          blockMaterials[b.id] = _makeMat("mat_" + b.id, b.texture, scene, b.fallbackColor);

        } else {
          // ── Multi-face block (grass): different top / side / bottom ──
          const matSide   = _makeMat("mat_" + b.id + "_side",   b.texture.side,   scene, b.fallbackColor);
          const matTop    = _makeMat("mat_" + b.id + "_top",    b.texture.top,    scene, "#5aac44");
          const matBottom = _makeMat("mat_" + b.id + "_bottom", b.texture.bottom, scene, b.fallbackColor);

          const multi = new BABYLON.MultiMaterial("multi_" + b.id, scene);
          // Order matches Babylon face indices 0-5
          // Faces: +X, -X, +Y, -Y, +Z, -Z
          multi.subMaterials = [
            matSide,    // 0: right
            matSide,    // 1: left
            matTop,     // 2: top  ← green grass
            matBottom,  // 3: bottom ← dirt
            matSide,    // 4: front
            matSide,    // 5: back
          ];

          blockMaterials[b.id] = multi;
        }
      });
    }

    /**
     * Returns the cached material for a block id.
     * Works for both StandardMaterial and MultiMaterial.
     */
    function getBlockMaterial(blockId) {
      const mat = blockMaterials[blockId];
      if (!mat) throw new Error("[blocks] No material for: " + blockId);
      return mat;
    }

    /**
     * Returns true if a block type uses MultiMaterial (per-face textures).
     * world.js uses this to know whether to set subMeshes on the box mesh.
     */
    function isMultiFace(blockId) {
      return blockMaterials[blockId] instanceof BABYLON.MultiMaterial;
    }
  </script>

  <!-- world.js -->
  <script>
    const WORLD_CONFIG = {
      SIZE:        40,
      MAX_HEIGHT:  6,
      BASE_HEIGHT: 1,
      NOISE_SCALE: 0.12,
    };

    const blockMap = new Map();
    let _worldScene = null;
    let _noise      = null;

    function toKey(x, y, z) {
      return Math.round(x) + "," + Math.round(y) + "," + Math.round(z);
    }

    function getTerrainHeight(x, z) {
      const v = _noise.noise2D(x * WORLD_CONFIG.NOISE_SCALE, z * WORLD_CONFIG.NOISE_SCALE);
      return Math.floor(((v + 1) / 2) * WORLD_CONFIG.MAX_HEIGHT) + WORLD_CONFIG.BASE_HEIGHT;
    }

    function spawnBlock(x, y, z, blockId) {
      const key = toKey(x, y, z);
      if (blockMap.has(key)) return null;

      const mat = getBlockMaterial(blockId);

      // For MultiMaterial blocks (grass), Babylon needs explicit subMeshes
      // so it knows which sub-material maps to which face of the box.
      // A box has 6 faces = 6 subMeshes, each covering 2 triangles (6 indices).
      //
      // CreateBox with faceUV/faceColors approach works too, but subMeshes
      // is cleaner when combining with a MultiMaterial.
      const isMulti = mat instanceof BABYLON.MultiMaterial;

      const mesh = BABYLON.MeshBuilder.CreateBox(
        "block_" + key,
        {
          size: 0.99,
          // When using MultiMaterial we need the box to have separate
          // index groups per face — wrap:false keeps UVs clean per face
          wrap: isMulti,
        },
        _worldScene
      );

      mesh.position.set(x, y, z);
      mesh.material   = mat;
      mesh.isPickable = true;
      mesh.metadata   = { blockId, gridX: x, gridY: y, gridZ: z };

      // For MultiMaterial: assign each of the 6 box faces to its sub-material index.
      // Babylon's box face order: 0=right(+X), 1=left(-X), 2=top(+Y),
      //                           3=bottom(-Y), 4=front(+Z), 5=back(-Z)
      if (isMulti) {
        mesh.subMeshes = [];
        const verticesCount = mesh.getTotalVertices();
        // Each face = 2 triangles = 6 indices; box total = 36 indices
        for (let i = 0; i < 6; i++) {
          new BABYLON.SubMesh(i, 0, verticesCount, i * 6, 6, mesh);
        }
      }

      blockMap.set(key, mesh);
      return mesh;
    }

    function placeBlock(x, y, z, blockId) {
      if (blockMap.has(toKey(x, y, z))) return false;
      spawnBlock(x, y, z, blockId);
      return true;
    }

    function removeBlock(x, y, z) {
      const key  = toKey(x, y, z);
      const mesh = blockMap.get(key);
      if (!mesh) return false;
      mesh.dispose();
      blockMap.delete(key);
      return true;
    }

    function getBlock(x, y, z) {
      return blockMap.get(toKey(x, y, z)) || null;
    }

    function initWorld(scene) {
      _worldScene = scene;
      _noise      = new SimplexNoise();
      const half  = Math.floor(WORLD_CONFIG.SIZE / 2);

      for (let x = -half; x < half; x++) {
        for (let z = -half; z < half; z++) {
          const h = getTerrainHeight(x, z);
          spawnBlock(x, h, z, h > WORLD_CONFIG.BASE_HEIGHT ? "grass" : "dirt");
          for (let y = h - 1; y > 0; y--) spawnBlock(x, y, z, "dirt");
          spawnBlock(x, 0, z, "stone");
        }
      }
      console.log("[world] Generated " + blockMap.size + " blocks");
    }
  </script>

  <!-- player.js -->
  <script>
    const PLAYER_CONFIG = {
      MOVE_SPEED:   0.12,
      SPRINT_SPEED: 0.22,
      JUMP_FORCE:   0.18,
      GRAVITY:      0.012,
      EYE_HEIGHT:   1.7,
      REACH:        6,
      FLOOR_OFFSET: 0.5,
    };

    let _camera           = null;
    let _playerScene      = null;
    let _playerCanvas     = null;
    const _keys           = new Set();
    let _verticalVelocity = 0;
    let _isOnGround       = false;
    let _selectedBlockId  = "dirt";
    let _lastActionTime   = 0;
    const ACTION_COOLDOWN = 220;
    let _yaw   = 0;
    let _pitch = 0;
    const PITCH_LIMIT       = Math.PI / 2.1;
    const MOUSE_SENSITIVITY = 0.002;

    function initPlayer(scene, canvas) {
      _playerScene  = scene;
      _playerCanvas = canvas;

      _camera = new BABYLON.UniversalCamera(
        "playerCamera",
        new BABYLON.Vector3(0, PLAYER_CONFIG.EYE_HEIGHT + 5, -5),
        scene
      );
      _camera.minZ = 0.1;
      _camera.inputs.clear();
      _camera.setTarget(new BABYLON.Vector3(0, PLAYER_CONFIG.EYE_HEIGHT + 4, 0));

      window.addEventListener("keydown", (e) => {
        _keys.add(e.code);
        if (e.code === "Digit1") _selectBlock(PHASE_1_HOTBAR[0]);
        if (e.code === "Digit2") _selectBlock(PHASE_1_HOTBAR[1]);
      });
      window.addEventListener("keyup", (e) => _keys.delete(e.code));

      document.addEventListener("mousemove", _onMouseMove);
      canvas.addEventListener("mousedown",   _onMouseDown);
      canvas.addEventListener("contextmenu", (e) => e.preventDefault());

      scene.onBeforeRenderObservable.add(_playerUpdate);
      console.log("[player] Initialized");
    }

    function _onMouseMove(e) {
      if (document.pointerLockElement !== _playerCanvas) return;
      _yaw   += e.movementX * MOUSE_SENSITIVITY;
      _pitch -= e.movementY * MOUSE_SENSITIVITY;
      _pitch  = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, _pitch));
      const cosP = Math.cos(_pitch);
      _camera.setTarget(new BABYLON.Vector3(
        _camera.position.x + Math.sin(_yaw) * cosP,
        _camera.position.y + Math.sin(_pitch),
        _camera.position.z + Math.cos(_yaw) * cosP
      ));
    }

    function _onMouseDown(e) {
      if (document.pointerLockElement !== _playerCanvas) return;
      const now = Date.now();
      if (now - _lastActionTime < ACTION_COOLDOWN) return;
      _lastActionTime = now;

      const ray = _playerScene.createPickingRay(
        _playerCanvas.width / 2,
        _playerCanvas.height / 2,
        BABYLON.Matrix.Identity(),
        _camera
      );
      const hit = _playerScene.pickWithRay(
        ray,
        (m) => m.isPickable && m.metadata && m.metadata.blockId
      );
      if (!hit || !hit.hit || hit.distance > PLAYER_CONFIG.REACH) return;

      const { gridX, gridY, gridZ } = hit.pickedMesh.metadata;

      if (e.button === 0) {
        removeBlock(gridX, gridY, gridZ);
      } else if (e.button === 2) {
        const n = hit.getNormal(true);
        if (!n) return;
        const px = Math.round(_camera.position.x);
        const pz = Math.round(_camera.position.z);
        const py = Math.round(_camera.position.y - PLAYER_CONFIG.EYE_HEIGHT);
        const bx = gridX + Math.round(n.x);
        const by = gridY + Math.round(n.y);
        const bz = gridZ + Math.round(n.z);
        if (bx === px && bz === pz && (by === py || by === py + 1)) return;
        placeBlock(bx, by, bz, _selectedBlockId);
      }
    }

    function _selectBlock(blockId) {
      _selectedBlockId = blockId;
      updateBlockIndicator(blockId);
    }

    function _playerUpdate() {
      if (!_camera) return;
      const pos      = _camera.position;
      const speed    = (_keys.has("ShiftLeft") || _keys.has("ShiftRight"))
                         ? PLAYER_CONFIG.SPRINT_SPEED
                         : PLAYER_CONFIG.MOVE_SPEED;

      const fwd   = new BABYLON.Vector3(Math.sin(_yaw), 0, Math.cos(_yaw));
      const right = new BABYLON.Vector3(Math.cos(_yaw), 0, -Math.sin(_yaw));
      const move  = BABYLON.Vector3.Zero();

      if (_keys.has("KeyW")) move.addInPlace(fwd);
      if (_keys.has("KeyS")) move.subtractInPlace(fwd);
      if (_keys.has("KeyA")) move.subtractInPlace(right);
      if (_keys.has("KeyD")) move.addInPlace(right);

      if (move.length() > 0) {
        move.normalize().scaleInPlace(speed);
        pos.addInPlace(move);
      }

      _verticalVelocity -= PLAYER_CONFIG.GRAVITY;
      pos.y += _verticalVelocity;

      const groundY   = _findGround(Math.round(pos.x), pos.y, Math.round(pos.z));
      const standingY = groundY + 1 + PLAYER_CONFIG.EYE_HEIGHT + PLAYER_CONFIG.FLOOR_OFFSET;

      if (pos.y <= standingY) {
        pos.y             = standingY;
        _verticalVelocity = 0;
        _isOnGround       = true;
      } else {
        _isOnGround = false;
      }

      if (_keys.has("Space") && _isOnGround) {
        _verticalVelocity = PLAYER_CONFIG.JUMP_FORCE;
        _isOnGround       = false;
      }

      const half = Math.floor(WORLD_CONFIG.SIZE / 2) - 1;
      pos.x = Math.max(-half, Math.min(half, pos.x));
      pos.z = Math.max(-half, Math.min(half, pos.z));
    }

    function _findGround(x, fromY, z) {
      for (let y = Math.floor(fromY); y >= -2; y--) {
        if (getBlock(x, y, z)) return y;
      }
      return -2;
    }
  </script>

  <!-- ui.js -->
  <script>
    let _gameStarted = false;

    function initUI(canvas) {
      const startBtn      = document.getElementById("start-btn");
      const lockPrompt    = document.getElementById("lock-prompt");
      const pausedOverlay = document.getElementById("paused-overlay");
      const controlsHint  = document.getElementById("controls-hint");

      startBtn.addEventListener("click", () => {
        lockPrompt.classList.add("hidden");
        _gameStarted = true;
        setTimeout(() => {
          canvas.requestPointerLock();
        }, 50);
      });

      document.addEventListener("pointerlockchange", () => {
        if (document.pointerLockElement === canvas) {
          pausedOverlay.classList.remove("visible");
        } else if (_gameStarted) {
          pausedOverlay.classList.add("visible");
        }
      });

      pausedOverlay.addEventListener("click", () => canvas.requestPointerLock());

      setTimeout(() => controlsHint.classList.add("hidden"), 8000);
    }

    function updateBlockIndicator(blockId) {
      const b = BLOCK_TYPES[blockId];
      if (!b) return;
      document.getElementById("block-icon").textContent = b.emoji;
      document.getElementById("block-name").textContent = b.name;
    }
  </script>

  <!-- main.js — runs last, all functions above are already defined -->
  <script>
    (function () {
      try {
        if (typeof BABYLON      === "undefined") throw new Error("Babylon.js CDN failed to load. Check your internet connection.");
        if (typeof SimplexNoise === "undefined") throw new Error("SimplexNoise CDN failed to load. Check your internet connection.");

        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        const scene  = new BABYLON.Scene(engine);

        // Sky — warm afternoon blue
        scene.clearColor = new BABYLON.Color4(0.47, 0.73, 0.95, 1.0);

        // Fog — matches sky so world edge blends naturally
        scene.fogMode    = BABYLON.Scene.FOGMODE_LINEAR;
        scene.fogStart   = 22;
        scene.fogEnd     = 42;
        scene.fogColor   = new BABYLON.Color3(0.47, 0.73, 0.95);

        // Hemispheric light = sky light (top) + ground bounce (bottom)
        // diffuse  = direct sky color hitting top faces
        // specular = shine on surfaces (keep low for matte blocks)
        // groundColor = warm earth tone bouncing up onto block undersides
        const amb = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0, 1, 0), scene);
        amb.diffuse      = new BABYLON.Color3(0.9, 0.95, 1.0);   // cool skylight
        amb.specular     = new BABYLON.Color3(0.1, 0.1, 0.1);    // minimal shine
        amb.groundColor  = new BABYLON.Color3(0.4, 0.3, 0.2);    // warm ground bounce
        amb.intensity    = 1.1;

        // Directional light = sun casting side shadows on blocks
        // This is what makes the top face brighter than the sides —
        // giving blocks their 3D depth without needing real-time shadows
        const sun = new BABYLON.DirectionalLight(
          "sun",
          new BABYLON.Vector3(-0.6, -1.2, -0.8).normalize(),
          scene
        );
        sun.diffuse    = new BABYLON.Color3(1.0, 0.95, 0.85);   // warm sunlight
        sun.specular   = new BABYLON.Color3(0.2, 0.2, 0.15);
        sun.intensity  = 0.75;

        initBlockMaterials(scene);
        initWorld(scene);
        initPlayer(scene, canvas);
        initUI(canvas);
        updateBlockIndicator(PHASE_1_HOTBAR[0]);

        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());

        console.log("[main] BuildRight Phase 1 running ✅");

      } catch (err) {
        document.body.innerHTML = `
          <div style="position:fixed;inset:0;background:#1a0a00;color:#ff6b35;

            <div style="margin-top:20px;color:#aaa;">Open the browser Console (F12) for more details.</div>
